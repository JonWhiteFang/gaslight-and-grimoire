name: CI

# Deployment moved to a Cloudflare assets-only Worker (issue #47), which builds
# from `main` on push Cloudflare-side (see wrangler.jsonc). This workflow keeps
# the merge gate: lint + content validation + Vitest, then a build-compiles
# check. It no longer publishes anywhere.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Correctness gate: lint + content validation + full test suite. `build`
  # depends on this, so a failing check blocks the merge gate.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      # --ignore-scripts: don't run dependency lifecycle scripts under the CI
      # token (F-038). Only esbuild ships an install script and it's a no-op
      # (its binary comes via an optional platform package), so build/test are
      # unaffected.
      - run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Validate case content
        run: node scripts/validateCase.mjs

      - name: Run test suite
        run: npm run test:run

  # Build-compiles check. `npm run build` runs `tsc` (src/) + `tsc -p
  # tsconfig.scripts.json` (scripts/ + vite.config.ts — the tooling the main
  # tsconfig leaves ungated, incl. the validator source; F-123) + vite build.
  # The actual deploy build runs Cloudflare-side from wrangler.jsonc; this just
  # proves `main` builds green as part of the gate.
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --ignore-scripts

      # Dependency auditing lives in security.yml (npm audit + OWASP
      # Dependency-Check on every PR), not on the deploy critical path — a new
      # transitive advisory shouldn't block a docs deploy (F-032).
      - run: npm run build

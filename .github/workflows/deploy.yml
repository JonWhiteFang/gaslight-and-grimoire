name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # GitHub recommends `false` for Pages so a rapid second push doesn't abort a
  # live deployment mid-flight.
  cancel-in-progress: false

jobs:
  # Correctness gate: content validation + full test suite. `build` (and
  # therefore `deploy`) depends on this, so a failing test blocks the deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate case content
        run: node scripts/validateCase.mjs

      - name: Run test suite
        run: npm run test:run

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Dependency auditing lives in security.yml (npm audit + OWASP
      # Dependency-Check on every PR), not on the deploy critical path — a new
      # transitive advisory shouldn't block a docs deploy (F-032).
      - run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    # Deploy only on pushes to main / manual dispatch — never from a PR build.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

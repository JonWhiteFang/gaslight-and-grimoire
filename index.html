<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy (F-037). In production the authoritative CSP is a
      real response header set by the Cloudflare Worker via `public/_headers`
      (issue #47) — that header additionally carries `frame-ancestors 'none'`
      (clickjacking defence), which a <meta> CSP cannot express. This <meta> tag
      is kept as the CSP for local `vite dev`/`preview` (no Worker there) and as
      defence-in-depth; keep the two directive strings in sync.

      `style-src` keeps 'unsafe-inline' deliberately: framer-motion writes
      per-frame inline `transform`/`opacity` styles (~9 animated components) and
      several components use dynamic `style={{…}}` (meters, gradients, evidence
      threads). Those can't be hash/nonce-pinned (values change every frame), so
      dropping 'unsafe-inline' would break animation and dynamic styling. All
      other directives stay locked to 'self'; `script-src` has NO 'unsafe-inline'.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'none';" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaslight &amp; Grimoire</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
